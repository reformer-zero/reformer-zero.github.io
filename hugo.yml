baseURL: https://reformer-zero.github.io
title: reformer-zero site
pagination.pagerSize: 5
theme: hugo-PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
disqusShortname: emmaoni-com
disqus_url: emmaoni-com.disqus.com
relativeURLs: false

minify:
    disableXML: true
    minifyOutput: true

params:
    env: production # to enable google analytics, opengraph, twitter-cards and schema.
    title: iO
    description: "Welcome to the reformer-zero website"
    keywords: [Blog, Portfolio, PaperMod, hacking, 5hylock, emmanuel oni, emmanuel oni canada, reversing, reverse engineering, hacking, hacker, reformer-zero]
    author: reformer-zero
    # author: ["Me", "You"] # multiple authors
    images: ["<link or path of image for opengraph, twitter-cards>"]
    DateFormat: "January 2, 2006"
    defaultTheme: dark # dark, light
    disableThemeToggle: false

    ShowReadingTime: true
    ShowShareButtons: true
    ShowPostNavLinks: true
    ShowBreadCrumbs: true
    ShowCodeCopyButtons: false
    ShowWordCount: false
    ShowRssButtonInSectionTermList: true
    UseHugoToc: true
    disableSpecial1stPost: false
    disableScrollToTop: false
    comments: false
    hidemeta: false
    hideSummary: false
    showtoc: false
    tocopen: false

    assets:
        # disableHLJS: true # to disable highlight.js
        # disableFingerprinting: true
        favicon: /favicon.ico

    label:
        text: "reformer-zero"
        icon: /favicon.ico
        iconHeight: 35

    # profile-mode
    profileMode:
        enabled: true # needs to be explicitly set
        title: reformer-zero
        subtitle: "Security Researcher and Technology Enthusiast"
        # imageUrl: "https://avatars.githubusercontent.com/u/84208619?s=400&u=5284c4d18a594dc58ae1e4439d40820374a45c05&v=4"
        imageUrl: "sunset.gif"
        imageWidth: 400
        imageHeight: 300
        imageTitle: sunset loop gif
        buttons:
            - name: 👨🏽‍💻 Blog
              url: posts

    # home-info mode
    homeInfoParams:
        Title: "Hi there \U0001F44B"
        Content: Welcome to my blog

    socialIcons:
        - name: twitter
          url: "https://twitter.com/trashtrash28507"
        - name: github
          url: "https://github.com/reformer-zero"

    analytics:
      google:
        SiteVerificationTag: "G-88Q8VFZZKG"

    cover:
      hidden: false # hide everywhere but not in structured data
      hiddenInList: false # hide on list pages and home
      hiddenInSingle: true # hide on single page

    # https://fusejs.io/api/options.html
    fuseOpts:
      isCaseSensitive: false
      shouldSort: true
      location: 0
      distance: 1000
      threshold: 0.4
      minMatchCharLength: 0
      limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
      keys: ["title", "permalink", "summary", "content"]
menu:
    main:
        - identifier: tags
          name: Tags
          url: /tags/
          weight: 40
        - identifier: about
          name: About
          url: /about
          weight: 10
        - identifier: search
          name: Search
          url: /search
          weight: 30

outputs:
    home:
        - HTML
        - RSS
        - JSON 


pygmentsUseClasses: true
markup:
    highlight:
        # anchorLineNos: true
        codeFences: true
        guessSyntax: true
        lineNos: true
        style: monokai
